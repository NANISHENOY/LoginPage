<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blazers.io</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
</head>
<body class="min-vh-100 d-flex align-items-stretch">

  
  <div class="col-md-6 d-flex align-items-center ps-5 ms-3 pe-4">
    <div class="w-100">

      <p class="fs-4 mt-5 mb-0" style="color: #161616;">Welcome,</p>
      <p class="mb-0 fw-normal" style="color: #666666;">See your growth and get consulting support</p>

      <button  class="mt-3 w-100 py-3 d-flex align-items-center justify-content-center gap-2"
        style="font-size:16px; background-color: white; border: 1px solid #CFCFCF; border-radius: 6px;">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="" style="width:20px; height:20px;">
        Sign in with Google
      </button>

      <div class="d-flex align-items-center py-3">
        <hr class="flex-grow-1 m-0">
        <span class="mx-3" style="font-size:16px;color:#222327;">Or</span>
        <hr class="flex-grow-1 m-0">
      </div>

      <label class="form-label mb-1" style="font: size 16px;">Email</label>
      <input type="email" class="form-control py-3 mb-3" placeholder="mail@gmail.com" style="padding:12px 14px; border:1px solid #CFCFCF ; border-radius:6px;">

      <label class="form-label  mb-1" style="font-size:16px;">Password</label>
      <div class="position-relative mb-3">
        <input type="password" class="form-control py-3 pe-5" placeholder="min. 8 character" style="padding:12px 14px;border:1px solid #CFCFCF;border-radius:6px;">
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#828181;font-size:16px;">&#128065;</span>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember" style="font-size:16px;">Remember me</label>
        </div>
        <span style="font-size:16px;cursor:pointer;">Forgot password?</span>
      </div>

      <button class="btn w-100" style="background-color:#1AEBB6;color:#fff;height:56px;font-size:1.1rem;font-weight:500;border-radius:6px;">Login</button>

      <p class="text-center mt-3 mb-0" style="font-size:0.85rem;color:#888;">
        Not registered yet?
        <span style="font-weight:700;color:#222;cursor:pointer;">Create an account</span>
      </p>

    </div>
  </div>

  <div class="col-md-6 d-flex p-4">
    <div class="lex-grow-1 d-flex align-items-center justify-content-center p-4">
      <img src="images/Group 168.png" class="img-fluid" alt=" ">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
